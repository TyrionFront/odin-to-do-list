<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h2 class="sidebar-title">Projects</h2>
      <ul id="project-list" class="project-list"></ul>
      <form id="add-project-form" class="add-form">
        <input id="new-project-name" type="text" placeholder="New project..." required>
        <button type="submit" aria-label="Add project">+</button>
      </form>
    </aside>

    <main class="main">
      <header class="main-header">
        <h1 id="project-title" class="project-title"></h1>
      </header>

      <form id="add-todo-form" class="add-todo-form">
        <input id="new-todo-title" type="text" placeholder="Add a new todo..." required>
        <input id="new-todo-due" type="date" aria-label="Due date">
        <select id="new-todo-priority" aria-label="Priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button type="submit">Add</button>
      </form>

      <ul id="todo-list" class="todo-list"></ul>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay"></div>
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
    <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
    <h2 id="modal-heading">Edit Todo</h2>
    <input type="hidden" id="modal-id">
    <div class="form-group">
      <label for="modal-title">Title</label>
      <input id="modal-title" type="text">
    </div>
    <div class="form-group">
      <label for="modal-description">Description</label>
      <textarea id="modal-description" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label for="modal-due">Due Date</label>
      <input id="modal-due" type="date">
    </div>
    <div class="form-group">
      <label for="modal-priority">Priority</label>
      <select id="modal-priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="form-group">
      <label for="modal-notes">Notes</label>
      <textarea id="modal-notes" rows="3"></textarea>
    </div>
    <button id="modal-save" class="btn-primary">Save</button>
  </div>
</body>
</html>
